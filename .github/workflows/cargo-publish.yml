# Cargo publish workflow
# 推送 v* 标签时：全 feature 下 fmt / clippy / test，通过后按依赖顺序发布所有 crate。
# 发版前务必将根 Cargo.toml 的 version 与标签一致（例如标签 v0.2.1 对应 version = "0.2.1"）。
# 发布顺序：
#   1. agentool-core
#   2. agentool

name: Cargo Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  check:
    name: Tests & Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy checks
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  publish:
    name: Publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Publish agentool-core
        run: cargo publish --package agentool-core --token ${{ secrets.CARGO_ACCESS_TOKEN }}

      - name: Wait for crates.io to index agentool-core
        run: sleep 30

      - name: Publish agentool
        run: cargo publish --package agentool --token ${{ secrets.CARGO_ACCESS_TOKEN }}
